name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'
  FFMPEG_URL: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0 pillow

      - name: Fetch ffmpeg
        run: |
          Invoke-WebRequest $env:FFMPEG_URL -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_dl
          New-Item -ItemType Directory -Force vendor | Out-Null
          Copy-Item (Get-ChildItem ffmpeg_dl -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName vendor\ffmpeg.exe
          $license = Get-ChildItem ffmpeg_dl -Recurse -Include LICENSE.txt, LICENSE | Select-Object -First 1
          if ($license) { Copy-Item $license.FullName vendor\FFMPEG-LICENSE.txt }
          '{0:N1} MB' -f ((Get-Item vendor\ffmpeg.exe).Length / 1MB)

      - name: Regenerate icon
        run: python tools/make_icon.py

      - name: Build
        run: |
          # Speech recognition is a separate executable on purpose: Qt6 and
          # ctranslate2 clash over native libraries, and sharing one _internal
          # folder brings the crash back even across processes.
          pyinstaller --noconfirm --clean transcriber.spec
          pyinstaller --noconfirm --clean SilenceCutter.spec
          robocopy dist\transcriber dist\SilenceCutter\transcriber /E /NFL /NDL /NJH /NJS /NC /NS
          if ($LASTEXITCODE -ge 8) { throw 'failed to place the transcriber' }
          $global:LASTEXITCODE = 0

      - name: Verify the build starts and can transcribe
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          foreach ($f in '_internal\ffmpeg.exe', '_internal\resources\icons\dark\play.svg',
                         'transcriber\sc-transcribe.exe') {
            if (-not (Test-Path "dist\SilenceCutter\$f")) { throw "$f missing from the build" }
          }
          if (Test-Path dist\SilenceCutter\transcriber\_internal\PyQt6) {
            throw 'Qt leaked into the transcriber - the crash it avoids would come back'
          }
          $proc = Start-Process dist\SilenceCutter\SilenceCutter.exe -PassThru
          Start-Sleep -Seconds 15
          if ($proc.HasExited) {
            throw "app exited on startup with code $($proc.ExitCode)"
          }
          Stop-Process -Id $proc.Id -Force
          Write-Host 'startup OK'

      - name: Package
        run: |
          if (Test-Path vendor\FFMPEG-LICENSE.txt) {
            Copy-Item vendor\FFMPEG-LICENSE.txt dist\SilenceCutter\FFMPEG-LICENSE.txt
          }
          Copy-Item LICENSE dist\SilenceCutter\LICENSE.txt
          Compress-Archive -Path dist\SilenceCutter\* -DestinationPath SilenceCutter-windows-x64.zip
          '{0:N1} MB' -f ((Get-Item SilenceCutter-windows-x64.zip).Length / 1MB)

      - name: Build installer
        run: |
          $iscc = Get-ChildItem 'C:\Program Files (x86)\Inno Setup 6', 'C:\Program Files\Inno Setup 6' `
            -Filter ISCC.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) {
            choco install innosetup -y --no-progress
            $iscc = Get-ChildItem 'C:\Program Files (x86)\Inno Setup 6', 'C:\Program Files\Inno Setup 6' `
              -Filter ISCC.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $iscc) { throw 'Inno Setup compiler not found' }
          # Tags look like v1.2.3; Inno wants a bare version number.
          $version = if ($env:GITHUB_REF_NAME -match '^v(\d+\.\d+\.\d+)$') { $Matches[1] } else { '0.0.0' }
          & $iscc.FullName "/DAppVersion=$version" installer.iss
          Get-ChildItem installer_output

      - uses: actions/upload-artifact@v4
        with:
          name: SilenceCutter-windows-x64
          path: |
            SilenceCutter-windows-x64.zip
            installer_output/*.exe
          retention-days: 14

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:GITHUB_REF_NAME" `
            SilenceCutter-windows-x64.zip (Get-ChildItem installer_output\*.exe).FullName `
            --title "SilenceCutter $env:GITHUB_REF_NAME" `
            --generate-notes
